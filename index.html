 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumTrader-AI™ Activation</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .globe {
      width: 180px;
      height: 180px;
      margin-top: 20px;
      border-radius: 50%;
      background-image: url("assets/images/qtai_globe.png");
      background-size: cover;
      animation: spin 20s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 10px;
    }

    .activation {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      width: 85%;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(0, 120, 255, 0.4);
    }

    .activation button {
      background-color: #0078ff;
      color: white;
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
    }

    .activation button:hover {
      background-color: #005fcc;
    }

    .ori {
      margin-top: 30px;
      width: 120px;
      height: auto;
    }

    .map {
      margin-top: 30px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- 🟢 TOP HANDSHAKE SCRIPT -->
  <script>
    console.log("Initializing QuantumTrader-AI™ handshake... (index.html top)");
    const handshakeInit = { source: "index.html", target: "server.mjs", stage: "init" };
    sessionStorage.setItem("QT_HANDSHAKE", JSON.stringify(handshakeInit));

    // Attempt early ping
    fetch("/handshake", {
      method: "GET"
    })
    .then(res => res.json())
    .then(data => console.log("🔗 Handshake (top):", data))
    .catch(err => console.warn("⚠️ Handshake top failed:", err));
  </script>

  <!-- 🌍 Rotating Globe -->
  <div class="globe"></div>

  <h1>QuantumTrader-AI™ Activation Portal</h1>

  <!-- ⚙️ Activation Panel -->
  <div class="activation">
    <p>Activate your QuantumTrader-AI™ license for ₦10,000</p>
    <button onclick="openAlatModal()">Activate Now</button>
  </div>

  <!-- 🌀 Ori Olokun Image -->
  <img src="assets/images/qtai_ori_olokun.png" alt="Ori Olokun" class="ori" />

  <!-- 🗺️ MacArthur Map -->
  <img src="assets/images/macarthur_map.png" alt="MacArthur Map" class="map" />

  <footer>
    QuantumTrader-AI™ © 2025 · Visionary, Architect & Builder: Olagoke Ajibulu
  </footer>

  <!-- 🟢 BOTTOM HANDSHAKE SCRIPT -->
  <script>
    console.log("Handshake ready: index.html ↔ server.mjs ↔ index2.html");

    async function verifyHandshake() {
      try {
        const response = await fetch("/handshake");
        const data = await response.json();
        console.log("🤝 Handshake (bottom):", data);
      } catch (err) {
        console.warn("Handshake verification failed:", err);
      }
    }

    verifyHandshake();

    function openAlatModal() {
      alert("ALAT activation modal will open here once Paystack/WEMA integration is approved.");
      fetch("/paystack-status")
        .then(res => res.json())
        .then(status => console.log("Paystack placeholder:", status));
    }
  </script>
 <script>
  async function handshake() {
    try {
      const response = await fetch('/handshake');
      const data = await response.text();
      console.log('Handshake success:', data);
    } catch (error) {
      console.error('Handshake failed:', error);
    }
  }

  handshake();
 </script>
</body>
</html>
