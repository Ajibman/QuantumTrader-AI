 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Trader AI</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      padding-top: 20px;
    }

    #app {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    #globe-container {
      width: 250px;
      height: 250px;
      margin: 0 auto 40px auto;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      perspective: 1000px;
    }

    #globe {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
    }

    /* --- Triangle Node Layout --- */
    #triangle-layout {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
      margin-top: 40px;
    }

    .node {
      width: 200px;
      height: 120px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .node:hover {
      transform: scale(1.05);
    }

    /* Responsive adjustments */
    @media(min-width: 768px){
      #globe-container {
        width: 250px;
        height: 250px;
      }

      .node {
        width: 220px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Welcome to Quantum Trader AI</h1>

    <div id="globe-container">
      <img src="assets/images/globe.png" alt="Rotating Globe" id="globe" />
    </div>

    <div id="status">Initializing handshake...</div>

    <!-- Triangle Node Layout -->
    <div id="triangle-layout">
      <div class="node" id="trading-floor">Trading Floor</div>
      <div class="node" id="trader-lab">TraderLab</div>
      <div class="node" id="cpilot">CPilot</div>
    </div>
  </div>

  <script>
    // --- Handshake script ---
    async function initHandshake() {
      try {
        const response = await fetch('/handshake', { method: 'POST' });
        const data = await response.json();
        if(data.status === 'ok'){
          console.log('Handshake successful with server.');
          document.getElementById('status').textContent = 'Handshake successful!';
        } else {
          console.error('Handshake failed.');
          document.getElementById('status').textContent = 'Handshake failed.';
        }
      } catch(err){
        console.error('Error during handshake:', err);
        document.getElementById('status').textContent = 'Error during handshake.';
      }
    }

    window.addEventListener('DOMContentLoaded', initHandshake);

    // --- Rotating globe animation ---
    const globe = document.getElementById('globe');
    let rotation = 0;
    function rotateGlobe(){
      rotation += 0.018; // ~2.5 seconds per full rotation
      globe.style.transform = `rotateY(${rotation*360}deg)`;
      requestAnimationFrame(rotateGlobe);
    }
    rotateGlobe();
  </script>
</body>
</html>
