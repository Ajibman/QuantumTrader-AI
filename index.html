 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Trader AI</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* --- Base Styles --- */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    #app {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 2em;
    }

    /* --- Globe Container --- */
    #globe-wrapper {
      width: 500px;
      height: 500px;
      margin-bottom: 60px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      perspective: 1000px;
    }

    #globe {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.05s linear;
    }

    /* --- Status --- */
    #status {
      margin-bottom: 60px;
      font-size: 1.2em;
      color: #333;
    }

    /* --- Triangle Node Layout Wrapper --- */
    #triangle-layout-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 300px;
      margin: 0 auto;
    }

    .node {
      width: 200px;
      height: 120px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      transition: transform 0.2s;
    }

    .node:hover {
      transform: scale(1.05);
    }

    /* Triangle positions */
    #trading-floor {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    #trader-lab {
      bottom: 0;
      left: 10%;
    }

    #cpilot {
      bottom: 0;
      right: 10%;
    }

    /* --- Footer --- */
    footer {
      margin-top: 80px;
      font-size: 0.9em;
      color: #666;
    }

    /* --- Responsive --- */
    @media (max-width: 1024px) {
      #globe-wrapper {
        width: 400px;
        height: 400px;
      }
      .node {
        width: 180px;
        height: 110px;
      }
    }

    @media (max-width: 768px) {
      #globe-wrapper {
        width: 350px;
        height: 350px;
      }
      .node {
        width: 150px;
        height: 100px;
      }
      #trader-lab {
        left: 5%;
      }
      #cpilot {
        right: 5%;
      }
      #triangle-layout-wrapper {
        height: 250px;
      }
    }

    @media (max-width: 480px) {
      #globe-wrapper {
        width: 300px;
        height: 300px;
      }
      .node {
        width: 120px;
        height: 80px;
        font-size: 0.9em;
      }
      #triangle-layout-wrapper {
        height: 200px;
      }
    }

.hero-section {
  text-align: center;
  padding: 30px 10px;
}

.globe {
  width: 180px;
  height: 180px;
  animation: spin 20s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
   
  </style>
</head>
<body>
  <div id="app">
    <h1>Welcome to Quantum Trader AI</h1>

    <!-- Globe -->
    <div id="globe-wrapper">
      <img src="assets/images/globe.png" alt="Rotating Globe" id="globe">
    </div>

    <div id="status">Initializing handshake...</div>

    <!-- Triangle Node Layout -->
    <div id="triangle-layout-wrapper">
      <div class="node" id="trading-floor">Trading Floor</div>
      <div class="node" id="trader-lab">TraderLab</div>
      <div class="node" id="cpilot">CPilot</div>
    </div>

    <!-- Footer / Attributions -->
    <footer>
      <p>© 2025 Quantum Trader AI. All rights reserved.</p>
      <p>Globe image &copy; contributors, TraderLab & CPilot modules developed in-house.</p>
    </footer>
  </div>

  <script>
    // --- Handshake Script ---
    async function initHandshake() {
      try {
        const response = await fetch('/handshake', { method: 'POST' });
        const data = await response.json();
        if (data.status === 'ok') {
          console.log('Handshake successful with server.');
          document.getElementById('status').textContent = 'Handshake successful!';
        } else {
          console.error('Handshake failed.');
          document.getElementById('status').textContent = 'Handshake failed.';
        }
      } catch (err) {
        console.error('Error during handshake:', err);
        document.getElementById('status').textContent = 'Error during handshake.';
      }
    }

    window.addEventListener('DOMContentLoaded', initHandshake);

    // --- Rotating Globe ---
    const globe = document.getElementById('globe');
    let rotation = 0;
    function rotateGlobe() {
      rotation += 0.111; // ~3 seconds per 360°
      globe.style.transform = `rotateY(${rotation*360}deg)`;
      requestAnimationFrame(rotateGlobe);
    }
    rotateGlobe();
  </script>
</body>
</html>
